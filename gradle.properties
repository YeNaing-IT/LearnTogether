org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Hilt and several plugins still expect the legacy AGP extension; remove after Hilt fully targets AGP 9 new DSL.
android.newDsl=false
# KSP with AGP built-in Kotlin (see https://developer.android.com/r/tools/built-in-kotlin)
android.disallowKotlinSourceSets=false
